<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Privacy Policy for AI Token Metrix — a macOS menu-bar utility that parses local AI coding tool logs.">
  <title>Privacy Policy · AI Token Metrix</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .landing {
      max-width: 520px;
      margin: 0 auto;
      padding: 96px 24px;
      text-align: center;
    }
    .landing h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }
    .landing .app-brand {
      justify-content: center;
      margin-bottom: 16px;
    }
    .landing .subtitle {
      color: var(--fg-muted);
      font-size: 17px;
      margin-bottom: 48px;
    }
    .lang-choice {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lang-choice a {
      display: inline-block;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.15s ease;
      min-width: 180px;
    }
    .lang-choice a:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .lang-choice a.secondary {
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .lang-choice a.secondary:hover {
      background: var(--border-soft);
    }
    .principle {
      margin-top: 64px;
      padding: 24px;
      background: var(--card);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
      text-align: left;
      color: var(--fg-muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .principle strong {
      color: var(--fg);
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    @media (max-width: 640px) {
      .landing {
        padding: 64px 20px;
      }
      .landing h1 {
        font-size: 32px;
      }
      .lang-choice a {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="app-brand"><strong>AI Token Metrix</strong></div>
    <h1>Privacy Policy</h1>
    <div class="subtitle">隐私政策 · 请选择语言 / Choose your language</div>

    <div class="lang-choice">
      <a href="en.html">English</a>
      <a href="zh-Hans.html" class="secondary">简体中文</a>
    </div>

    <div class="principle">
      <strong>Our Principle · 核心原则</strong>
      Your usage data never leaves your device.<br>
      您的使用数据永远不会离开您的设备。
    </div>
  </div>

  <script>
    // Auto-redirect based on browser language, but only on first visit and not if user came from a lang page
    (function() {
      try {
        var referrer = document.referrer || '';
        var hasChosen = sessionStorage.getItem('ppLangChosen');
        // If user is landing here directly (no referrer from our own pages) and hasn't chosen yet
        if (!hasChosen && referrer.indexOf(location.host) === -1) {
          var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
          sessionStorage.setItem('ppLangChosen', '1');
          if (lang.indexOf('zh') === 0) {
            location.replace('zh-Hans.html');
          }
          // English users stay on the landing page (or auto-redirect to en.html if desired)
        }
      } catch (e) { /* silently ignore */ }
    })();
  </script>
</body>
</html>
